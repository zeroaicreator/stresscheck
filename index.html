<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>こころの記録</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{color-scheme:dark}html,body{height:100%;background:#0f1318 !important}
body{color:#f0f4f8 !important;background:#0f1318 !important;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;font-size:16px;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
button{font-family:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent;border:none;background:none}
textarea,input{font-family:inherit}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideR{from{opacity:0;transform:translateX(36px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideL{from{opacity:0;transform:translateX(-36px)}to{opacity:1;transform:translateX(0)}}
.ani-fadeup{animation:fadeUp .3s ease both}
.ani-slider{animation:slideR .25s ease both}
.ani-slidel{animation:slideL .25s ease both}
.card{background:#1a2030;border:1px solid rgba(255,255,255,.12);border-radius:18px}
#app{max-width:480px;margin:0 auto;min-height:100vh;position:relative;background:#0f1318}
.dot-bg{position:fixed;inset:0;z-index:0;pointer-events:none;background:#0f1318;
  background-image:radial-gradient(circle,rgba(255,255,255,.03) 1px,transparent 1px);
  background-size:28px 28px}
.screen{position:relative;z-index:1;background:#0f1318;min-height:100vh}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;background:rgba(12,16,22,.97);
  border-top:1px solid rgba(255,255,255,.12);display:flex;z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:11px 8px 10px;color:rgba(255,255,255,.35);font-size:11px;font-weight:700;
  letter-spacing:.04em;transition:color .18s}
.nav-btn.on{color:#44e8c8}
.nav-btn svg{width:22px;height:22px}
.fab{position:fixed;bottom:74px;right:16px;display:flex;align-items:center;gap:8px;
  padding:14px 22px;background:linear-gradient(135deg,#44e8c8,#7eb8ff);
  border-radius:99px;color:#0a0e14;font-size:14px;font-weight:700;
  box-shadow:0 6px 28px rgba(68,232,200,.4);z-index:90;
  border:none;cursor:pointer;-webkit-tap-highlight-color:transparent}
.opt-btn{width:100%;background:#1e2638;border:2px solid rgba(255,255,255,.14);
  border-radius:14px;padding:16px 20px;color:#e8eef4;font-size:15px;font-weight:400;
  text-align:left;display:flex;justify-content:space-between;align-items:center;
  cursor:pointer;-webkit-tap-highlight-color:transparent}
.opt-btn:active{opacity:.8}
.arrow-btn{background:#1e2638;border:1px solid rgba(255,255,255,.18);border-radius:12px;
  width:42px;height:42px;color:#c8d8e8;font-size:22px;display:flex;align-items:center;
  justify-content:center;cursor:pointer;flex-shrink:0}
.cat-chip{padding:6px 13px;border-radius:99px;font-size:13px;font-weight:700;
  cursor:pointer;border:2px solid rgba(255,255,255,.14);background:#1e2638;color:#a0b0c0}
</style>
</head>
<body>
<div class="dot-bg"></div>
<div id="app"></div>
<script>
"use strict";
/* =============================================
   データ定義
============================================= */
var QS=[
  {id:1,text:"気持ちが落ち着かない、または\n浮き沈みがあると感じることがあった",cat:"メンタル",col:"#ff7aa8",opts:["あてはまる","ややあてはまる","あまりあてはまらない","あてはまらない"],sc:[0,33,66,100]},
  {id:2,text:"夜、よく眠れた。または、\n途中で目が覚めなかった",cat:"睡眠",col:"#7eb8ff",opts:["あてはまる","ややあてはまる","あまりあてはまらない","あてはまらない"],sc:[100,66,33,0]},
  {id:3,text:"日中、眠気やダルさを感じた",cat:"活力",col:"#ffd84a",opts:["あてはまる","ややあてはまる","あまりあてはまらない","あてはまらない"],sc:[0,33,66,100]},
  {id:4,text:"気分や体調の変化に気づいた",cat:"気づき",col:"#c49dff",opts:["あてはまる","ややあてはまる","あまりあてはまらない","あてはまらない"],sc:[100,66,33,0]},
  {id:5,text:"体を動かす趣味や休憩などで\nリフレッシュ出来た",cat:"回復",col:"#44e8c8",opts:["あてはまる","ややあてはまる","あまりあてはまらない","あてはまらない"],sc:[100,66,33,0]},
  {id:6,text:"飲酒した",cat:"飲酒",col:"#ffaa55",opts:["多い","少し多い","少し控えた","控えた or 摂取しなかった"],sc:[0,33,66,100]},
  {id:7,text:"喫煙した",cat:"喫煙",col:"#ff7070",opts:["多い","少し多い","少し控えた","控えた or 摂取しなかった"],sc:[0,33,66,100]}
];
var TOTAL=QS.length+1;
var MEN=["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
var MJP=["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
var WD=["日","月","火","水","木","金","土"];

/* =============================================
   ユーティリティ
============================================= */
function p2(n){return String(n).padStart(2,"0");}
function todayKey(){var d=new Date();return d.getFullYear()+"-"+p2(d.getMonth()+1)+"-"+p2(d.getDate());}
function parseDK(k){var a=k.split("-");return{y:+a[0],m:+a[1],d:+a[2]};}
function calcScore(ans){
  var keys=Object.keys(ans).filter(function(k){return k!=="free";});
  if(!keys.length)return 0;
  var sum=keys.reduce(function(s,k){var q=QS.find(function(q){return q.id===+k;});return s+(q?q.sc[ans[k]]:0);},0);
  return Math.round(sum/keys.length);
}
function lv(s){
  if(s>=80)return{lb:"良好",c:"#3ddc84",bg:"rgba(61,220,132,.18)",bd:"rgba(61,220,132,.5)"};
  if(s>=60)return{lb:"やや良好",c:"#44e8c8",bg:"rgba(68,232,200,.18)",bd:"rgba(68,232,200,.5)"};
  if(s>=40)return{lb:"注意",c:"#ffd84a",bg:"rgba(255,216,74,.18)",bd:"rgba(255,216,74,.5)"};
  return{lb:"要注意",c:"#ff7aa8",bg:"rgba(255,122,168,.18)",bd:"rgba(255,122,168,.5)"};
}
function loadRec(){try{var s=localStorage.getItem("sc_rec");return s?JSON.parse(s):{}}catch(e){return{};}}
function saveRec(r){try{localStorage.setItem("sc_rec",JSON.stringify(r));}catch(e){}}

/* =============================================
   SVGヘルパー
============================================= */
var NS="http://www.w3.org/2000/svg";
function svg(tag,a){
  var e=document.createElementNS(NS,tag);
  if(a)Object.keys(a).forEach(function(k){e.setAttribute(k,a[k]);});
  return e;
}

/* =============================================
   状態
============================================= */
var S={
  tab:"cal",
  rec:loadRec(),
  view:null,       // 結果表示の日付キー
  quiz:null,       // クイズ中の日付キー
  qstep:0,
  qans:{},
  qfree:"",
  qdir:1,
  cY:new Date().getFullYear(),
  cM:new Date().getMonth(),
  gY:new Date().getFullYear(),
  gM:new Date().getMonth(),
  gCat:"total"
};

function set(patch){Object.assign(S,patch);render();}

/* =============================================
   パーツ：スコアリング
============================================= */
function makeRing(score){
  var r=56,circ=2*Math.PI*r,off=circ-(score/100)*circ;
  var l=lv(score);
  var wrap=document.createElement("div");
  wrap.style.cssText="display:flex;flex-direction:column;align-items:center;gap:12px";
  var s=svg("svg",{width:150,height:150,viewBox:"0 0 140 140"});
  var defs=svg("defs");
  var gr=svg("linearGradient",{id:"rg",x1:"0%",y1:"0%",x2:"100%",y2:"100%"});
  var s1=svg("stop",{offset:"0%"}); s1.setAttribute("stop-color","#44e8c8");
  var s2=svg("stop",{offset:"100%"}); s2.setAttribute("stop-color","#7eb8ff");
  gr.appendChild(s1);gr.appendChild(s2);defs.appendChild(gr);s.appendChild(defs);
  s.appendChild(svg("circle",{cx:70,cy:70,r:r,fill:"none",stroke:"rgba(255,255,255,.1)","stroke-width":11}));
  var arc=svg("circle",{cx:70,cy:70,r:r,fill:"none",stroke:"url(#rg)","stroke-width":11,
    "stroke-linecap":"round","stroke-dasharray":circ,"stroke-dashoffset":circ,transform:"rotate(-90 70 70)"});
  arc.style.transition="stroke-dashoffset 1s ease";
  s.appendChild(arc);
  var t1=svg("text",{x:70,y:65,"text-anchor":"middle",fill:"#f0f4f8"});
  t1.style.cssText="font-size:28px;font-weight:700";
  t1.textContent=String(score);s.appendChild(t1);
  var t2=svg("text",{x:70,y:82,"text-anchor":"middle",fill:"#4a5a6a"});
  t2.style.fontSize="12px";t2.textContent="/ 100";s.appendChild(t2);
  wrap.appendChild(s);
  setTimeout(function(){arc.setAttribute("stroke-dashoffset",off);},60);
  var badge=document.createElement("span");
  badge.style.cssText="padding:6px 20px;border-radius:99px;font-size:14px;font-weight:700;letter-spacing:.05em;";
  badge.style.color=l.c;badge.style.background=l.bg;badge.style.border="2px solid "+l.bd;
  badge.textContent=l.lb;
  wrap.appendChild(badge);
  return wrap;
}

function makeCatBar(q,score){
  var row=document.createElement("div");
  row.style.cssText="display:flex;align-items:center;gap:12px;margin-bottom:12px";
  var label=document.createElement("span");
  label.style.cssText="width:50px;font-size:13px;font-weight:700;color:#c0ccd8;flex-shrink:0";
  label.textContent=q.cat;
  var track=document.createElement("div");
  track.style.cssText="flex:1;height:10px;border-radius:99px;background:rgba(255,255,255,.1);overflow:hidden";
  var fill=document.createElement("div");
  fill.style.cssText="height:100%;border-radius:99px;width:0%;transition:width .8s ease";
  fill.style.background="linear-gradient(90deg,"+q.col+"99,"+q.col+")";
  track.appendChild(fill);
  var val=document.createElement("span");
  val.style.cssText="width:30px;font-size:14px;font-weight:700;text-align:right";
  val.style.color=q.col;val.textContent=String(score);
  row.appendChild(label);row.appendChild(track);row.appendChild(val);
  setTimeout(function(){fill.style.width=score+"%";},60);
  return row;
}

function makeRadar(ans,raw,sz){
  sz=sz||260;
  var N=QS.length,cx=sz/2,cy=sz/2,R=sz*.31,LR=R+sz*.15;
  function ang(i){return(Math.PI*2/N)*i-Math.PI/2;}
  function pt(i,r){return{x:cx+r*Math.cos(ang(i)),y:cy+r*Math.sin(ang(i))};}
  var vals=QS.map(function(q){
    if(raw)return raw[q.id]!=null?raw[q.id]/100:0;
    return ans&&ans[q.id]!=null?q.sc[ans[q.id]]/100:0;
  });
  var labs=QS.map(function(q){
    if(raw)return raw[q.id]!=null?Math.round(raw[q.id]):"-";
    return ans&&ans[q.id]!=null?String(q.sc[ans[q.id]]):"-";
  });
  var s=svg("svg",{width:sz,height:sz,viewBox:"0 0 "+sz+" "+sz});
  s.style.overflow="visible";
  var defs=svg("defs");
  var gr=svg("linearGradient",{id:"radarG",x1:"0%",y1:"0%",x2:"100%",y2:"100%"});
  var g1=svg("stop",{offset:"0%"}); g1.setAttribute("stop-color","#44e8c8"); g1.setAttribute("stop-opacity","0.4");
  var g2=svg("stop",{offset:"100%"}); g2.setAttribute("stop-color","#7eb8ff"); g2.setAttribute("stop-opacity","0.25");
  gr.appendChild(g1);gr.appendChild(g2);defs.appendChild(gr);s.appendChild(defs);
  [.25,.5,.75,1].forEach(function(ratio){
    var pts=QS.map(function(_,i){var p=pt(i,R*ratio);return p.x+","+p.y;}).join(" ");
    s.appendChild(svg("polygon",{points:pts,fill:"none",stroke:"rgba(255,255,255,.12)","stroke-width":1}));
  });
  QS.forEach(function(_,i){var p=pt(i,R);s.appendChild(svg("line",{x1:cx,y1:cy,x2:p.x,y2:p.y,stroke:"rgba(255,255,255,.12)","stroke-width":1}));});
  var dp=QS.map(function(_,i){var p=pt(i,R*vals[i]);return p.x+","+p.y;}).join(" ");
  s.appendChild(svg("polygon",{points:dp,fill:"url(#radarG)",stroke:"#44e8c8","stroke-width":2.5,"stroke-linejoin":"round"}));
  QS.forEach(function(q,i){var p=pt(i,R*vals[i]);s.appendChild(svg("circle",{cx:p.x,cy:p.y,r:5,fill:q.col,stroke:"#0f1318","stroke-width":2}));});
  QS.forEach(function(q,i){
    var p=pt(i,LR);
    var ax=p.x<cx-5?"end":p.x>cx+5?"start":"middle";
    var t1=svg("text",{x:p.x,y:p.y,"text-anchor":ax,fill:"#dde8f0","font-size":11,"font-weight":700});
    t1.textContent=q.cat;s.appendChild(t1);
    var t2=svg("text",{x:p.x,y:p.y+15,"text-anchor":ax,fill:q.col,"font-size":12,"font-weight":700});
    t2.textContent=String(labs[i]);s.appendChild(t2);
  });
  return s;
}

function makeLineChart(data,cat,catCol,avgVal){
  var W=330,H=180,PL=18,PR=8,PT=8,PB=24;
  var iW=W-PL-PR,iH=H-PT-PB;
  var days=data.length;
  var s=svg("svg",{width:"100%",viewBox:"0 0 "+W+" "+H});
  [0,25,50,75,100].forEach(function(v){
    var y=PT+iH-(v/100)*iH;
    s.appendChild(svg("line",{x1:PL,y1:y,x2:W-PR,y2:y,stroke:"rgba(255,255,255,.07)","stroke-width":1}));
    var t=svg("text",{x:PL-3,y:y+4,"text-anchor":"end",fill:"#6080a0","font-size":9});
    t.textContent=String(v);s.appendChild(t);
  });
  if(avgVal!=null){
    var ay=PT+iH-(avgVal/100)*iH;
    s.appendChild(svg("line",{x1:PL,y1:ay,x2:W-PR,y2:ay,stroke:catCol+"77","stroke-width":1.5,"stroke-dasharray":"5,4"}));
  }
  data.forEach(function(d,i){
    if(d.day===1||d.day%5===0){
      var x=PL+(i/(days-1))*iW;
      var t=svg("text",{x:x,y:H-4,"text-anchor":"middle",fill:"#6080a0","font-size":9});
      t.textContent=String(d.day);s.appendChild(t);
    }
  });
  var pts=[];
  data.forEach(function(d,i){
    if(d[cat]!=null){
      var x=PL+(i/(days-1))*iW;
      var y=PT+iH-(d[cat]/100)*iH;
      pts.push({x:x,y:y});
    }
  });
  if(pts.length>1){
    var pathD=pts.map(function(p,i){return(i===0?"M":"L")+p.x.toFixed(1)+","+p.y.toFixed(1);}).join(" ");
    s.appendChild(svg("path",{d:pathD,fill:"none",stroke:catCol,"stroke-width":2.5,"stroke-linecap":"round","stroke-linejoin":"round"}));
  }
  pts.forEach(function(p){s.appendChild(svg("circle",{cx:p.x,cy:p.y,r:4,fill:catCol,stroke:"#1a2030","stroke-width":1.5}));});
  return s;
}

/* =============================================
   カレンダー画面
============================================= */
function renderCal(){
  var year=S.cY,month=S.cM,recs=S.rec,today=todayKey();
  var fd=new Date(year,month,1).getDay();
  var dm=new Date(year,month+1,0).getDate();
  var mRecs=Object.entries(recs).filter(function(e){var p=parseDK(e[0]);return p.y===year&&p.m===month+1;});
  var mAvg=mRecs.length?Math.round(mRecs.reduce(function(s,e){return s+calcScore(e[1].ans);},0)/mRecs.length):null;

  var d=document.createElement("div");
  d.className="screen ani-fadeup";
  d.style.padding="26px 16px 90px";

  // ヘッダー
  var hdr=document.createElement("div");
  hdr.style.marginBottom="24px";
  hdr.innerHTML='<p style="font-size:11px;letter-spacing:.22em;color:#44e8c8;margin-bottom:8px;font-weight:700">DAILY STRESS CHECK</p>'
    +'<h1 style="font-size:28px;font-weight:700;color:#f0f4f8">こころの記録</h1>';
  d.appendChild(hdr);

  // カレンダーカード
  var card=document.createElement("div");
  card.className="card";
  card.style.padding="20px 12px 16px";

  // 月ナビ
  var nav=document.createElement("div");
  nav.style.cssText="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px";
  var prevBtn=document.createElement("button");
  prevBtn.className="arrow-btn";prevBtn.textContent="‹";
  prevBtn.onclick=function(){set(month===0?{cM:11,cY:year-1}:{cM:month-1});};
  var nextBtn=document.createElement("button");
  nextBtn.className="arrow-btn";nextBtn.textContent="›";
  nextBtn.onclick=function(){set(month===11?{cM:0,cY:year+1}:{cM:month+1});};
  var mc=document.createElement("div");
  mc.style.textAlign="center";
  mc.innerHTML='<div style="font-size:21px;font-weight:700;color:#f0f4f8">'+year+'<span style="font-size:12px;color:#8090a0;margin-left:3px">年</span>'+(month+1)+'<span style="font-size:12px;color:#8090a0;margin-left:2px">月</span></div>'
    +'<div style="font-size:11px;color:#a0b0c0;margin-top:3px;font-weight:700">'+MEN[month]+" "+year+(mAvg!=null?'<span style="color:#44e8c8;margin-left:8px">avg '+mAvg+"</span>":"")+'</div>';
  nav.appendChild(prevBtn);nav.appendChild(mc);nav.appendChild(nextBtn);
  card.appendChild(nav);

  // 曜日行
  var wrow=document.createElement("div");
  wrow.style.cssText="display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px";
  WD.forEach(function(w,i){
    var c=document.createElement("div");
    c.style.cssText="text-align:center;font-size:11px;font-weight:700;padding:3px 0;color:"+(i===0?"#ff7aa8":i===6?"#7eb8ff":"#7090aa");
    c.textContent=w;wrow.appendChild(c);
  });
  card.appendChild(wrow);

  // 日グリッド
  var grid=document.createElement("div");
  grid.style.cssText="display:grid;grid-template-columns:repeat(7,1fr);gap:3px";
  for(var i=0;i<fd;i++){var e=document.createElement("div");grid.appendChild(e);}
  for(var dd=1;dd<=dm;dd++){
    (function(d2){
      var key=year+"-"+p2(month+1)+"-"+p2(d2);
      var rec=recs[key],isToday=key===today,isFuture=key>today;
      var score=rec?calcScore(rec.ans):null;
      var l=score!=null?lv(score):null;
      var b=document.createElement("button");
      b.style.cssText="aspect-ratio:1;border-radius:10px;border:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:2px;cursor:"+(isFuture?"default":"pointer");
      b.style.background=isToday?"rgba(68,232,200,.2)":rec?l.bg:"rgba(255,255,255,.04)";
      if(isToday)b.style.outline="2px solid rgba(68,232,200,.65)";
      var dn=document.createElement("span");
      dn.style.cssText="font-size:13px;line-height:1;font-weight:"+(isToday||rec?700:400);
      dn.style.color=isToday?"#44e8c8":isFuture?"rgba(255,255,255,.2)":rec?l.c:"#c0ccd8";
      dn.textContent=String(d2);b.appendChild(dn);
      if(score!=null){var sn=document.createElement("span");sn.style.cssText="font-size:9px;font-weight:700;line-height:1;color:"+l.c;sn.textContent=String(score);b.appendChild(sn);}
      if(rec){var dot=document.createElement("div");dot.style.cssText="width:5px;height:5px;border-radius:99px;background:"+l.c;b.appendChild(dot);}
      if(!isFuture)b.onclick=function(){if(recs[key])set({view:key});else set({quiz:key,qstep:0,qans:{},qfree:"",qdir:1});};
      grid.appendChild(b);
    })(dd);
  }
  card.appendChild(grid);
  d.appendChild(card);

  // 凡例
  var leg=document.createElement("div");
  leg.style.cssText="display:flex;gap:14px;margin-top:14px;flex-wrap:wrap;padding-left:4px";
  [{lb:"良好",c:"#3ddc84"},{lb:"やや良好",c:"#44e8c8"},{lb:"注意",c:"#ffd84a"},{lb:"要注意",c:"#ff7aa8"}].forEach(function(l){
    var lw=document.createElement("div");lw.style.cssText="display:flex;align-items:center;gap:5px";
    var dot=document.createElement("div");dot.style.cssText="width:7px;height:7px;border-radius:99px;background:"+l.c;
    var lb=document.createElement("span");lb.style.cssText="font-size:11px;color:#a0b0c0;font-weight:700";lb.textContent=l.lb;
    lw.appendChild(dot);lw.appendChild(lb);leg.appendChild(lw);
  });
  d.appendChild(leg);

  // FAB
  if(!recs[today]){
    var fab=document.createElement("button");
    fab.className="fab";
    fab.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16"><path d="M12 5v14M5 12h14"/></svg>今日のチェック';
    fab.onclick=function(){set({quiz:todayKey(),qstep:0,qans:{},qfree:"",qdir:1});};
    d.appendChild(fab);
  }
  return d;
}

/* =============================================
   クイズ画面
============================================= */
function renderQuiz(){
  var dk=S.quiz,step=S.qstep,ans=S.qans,free=S.qfree,dir=S.qdir;
  var p0=parseDK(dk);
  var isFree=step===QS.length;
  var q=isFree?null:QS[step];
  var canNext=isFree||(q&&ans[q.id]!=null);
  var prog=(step/TOTAL)*100;
  var animCls=dir>0?"ani-slider":"ani-slidel";

  var d=document.createElement("div");
  d.className="screen "+animCls;
  d.style.cssText="padding:24px 18px 90px;min-height:100vh;display:flex;flex-direction:column";

  // ヘッダー
  var hdr=document.createElement("div");
  hdr.style.cssText="display:flex;align-items:center;margin-bottom:24px";
  var backBtn=document.createElement("button");
  backBtn.style.cssText="background:none;border:none;color:#a0b0c0;font-size:26px;padding:4px 14px 4px 0;line-height:1";
  backBtn.textContent="‹";
  backBtn.onclick=function(){if(step===0)set({quiz:null});else set({qstep:step-1,qdir:-1});};
  var hi=document.createElement("div");
  hi.innerHTML='<div style="font-size:14px;color:#44e8c8;font-weight:700;letter-spacing:.06em">'+p0.y+"年"+p0.m+"月"+p0.d+'日</div>'
    +'<div style="font-size:12px;color:#a0b0c0;margin-top:2px;font-weight:700">'+(step+1)+" / "+TOTAL+'</div>';
  hdr.appendChild(backBtn);hdr.appendChild(hi);
  d.appendChild(hdr);

  // プログレスバー
  var pbw=document.createElement("div");
  pbw.style.cssText="height:4px;background:rgba(255,255,255,.1);border-radius:99px;margin-bottom:28px;overflow:hidden";
  var pbf=document.createElement("div");
  pbf.style.cssText="height:100%;background:linear-gradient(90deg,#44e8c8,#7eb8ff);border-radius:99px;transition:width .35s ease;width:"+prog+"%";
  pbw.appendChild(pbf);d.appendChild(pbw);

  // 問題エリア
  var qa=document.createElement("div");
  qa.style.cssText="flex:1;display:flex;flex-direction:column";

  if(!isFree&&q){
    // バッジ
    var bdg=document.createElement("div");
    bdg.style.cssText="display:inline-flex;align-items:center;gap:8px;background:#1e2638;border:2px solid "+q.col+"66;border-radius:99px;padding:6px 16px;align-self:flex-start;margin-bottom:20px";
    var dot=document.createElement("div");dot.style.cssText="width:8px;height:8px;border-radius:99px;background:"+q.col;
    var bdgtxt=document.createElement("span");bdgtxt.style.cssText="font-size:13px;font-weight:700;color:"+q.col;bdgtxt.textContent="Q"+q.id+" — "+q.cat;
    bdg.appendChild(dot);bdg.appendChild(bdgtxt);qa.appendChild(bdg);
    // 問題文
    var qtxt=document.createElement("p");
    qtxt.style.cssText="font-size:19px;font-weight:700;color:#f0f4f8;line-height:1.7;margin-bottom:26px;white-space:pre-line";
    qtxt.textContent=q.text;qa.appendChild(qtxt);
    // 選択肢
    var ow=document.createElement("div");ow.style.cssText="display:flex;flex-direction:column;gap:10px";
    q.opts.forEach(function(opt,i){
      var sel=ans[q.id]===i;
      var b=document.createElement("button");
      b.className="opt-btn";
      b.style.background=sel?q.col+"22":"#1e2638";
      b.style.borderColor=sel?q.col:"rgba(255,255,255,.14)";
      b.style.color=sel?q.col:"#e8eef4";
      b.style.fontWeight=sel?700:400;
      var span1=document.createElement("span");span1.textContent=opt;b.appendChild(span1);
      if(sel){var chk=document.createElement("span");chk.textContent="✓";chk.style.fontSize="18px";b.appendChild(chk);}
      b.onclick=function(){var na=Object.assign({},ans);na[q.id]=i;set({qans:na});};
      ow.appendChild(b);
    });
    qa.appendChild(ow);
  } else {
    // 自由記述
    var fb=document.createElement("div");
    fb.style.cssText="display:inline-flex;align-items:center;gap:8px;background:rgba(68,232,200,.1);border:2px solid rgba(68,232,200,.4);border-radius:99px;padding:6px 16px;align-self:flex-start;margin-bottom:20px";
    fb.innerHTML='<span style="font-size:13px;font-weight:700;color:#44e8c8">✦ 今日の良いこと</span>';
    qa.appendChild(fb);
    var fp=document.createElement("p");
    fp.style.cssText="font-size:19px;font-weight:700;color:#ffffff;line-height:1.7;margin-bottom:18px";
    fp.textContent="今日あった良いことを\n書いてみよう";fp.style.whiteSpace="pre-line";
    qa.appendChild(fp);
    var ta=document.createElement("textarea");
    ta.style.cssText="flex:1;min-height:130px;width:100%;background:#1e2638;border:2px solid rgba(255,255,255,.14);border-radius:14px;padding:14px;color:#f0f4f8;font-size:15px;line-height:1.8;resize:none;outline:none";
    ta.placeholder="例）同僚に仕事を褒めてもらえた。空が綺麗だった…など";
    ta.value=free;
    ta.addEventListener("focus",function(){ta.style.borderColor="rgba(68,232,200,.55)";});
    ta.addEventListener("blur",function(){ta.style.borderColor="rgba(255,255,255,.14)";});
    ta.addEventListener("input",function(){var v=ta.value.slice(0,150);ta.value=v;cnt.textContent=v.length+" / 100";S.qfree=v;});
    qa.appendChild(ta);
    var cnt=document.createElement("div");cnt.style.cssText="text-align:right;font-size:12px;color:#a0b0c0;margin-top:5px;font-weight:700";cnt.textContent=free.length+" / 100";
    qa.appendChild(cnt);
  }
  d.appendChild(qa);

  // 次へボタン
  var nb=document.createElement("button");
  nb.style.cssText="margin-top:22px;width:100%;padding:17px;border:none;border-radius:14px;font-size:16px;font-weight:700;letter-spacing:.05em;cursor:"+(canNext?"pointer":"not-allowed");
  nb.style.background=canNext?"linear-gradient(135deg,#44e8c8,#7eb8ff)":"#1e2638";
  nb.style.color=canNext?"#0a0e14":"#4a5a6a";
  nb.style.boxShadow=canNext?"0 4px 22px rgba(68,232,200,.3)":"none";
  nb.textContent=step<TOTAL-1?"次へ →":"記録する ✓";
  nb.onclick=function(){
    if(!canNext)return;
    if(step<TOTAL-1){set({qstep:step+1,qdir:1});}
    else{
      var newRec={ans:ans,free:S.qfree};
      S.rec[dk]=newRec;saveRec(S.rec);
      set({quiz:null,view:dk});
    }
  };
  d.appendChild(nb);
  return d;
}

/* =============================================
   結果画面
============================================= */
function renderResult(){
  var dk=S.view,rec=S.rec[dk];
  var score=calcScore(rec.ans);
  var p0=parseDK(dk);

  var d=document.createElement("div");
  d.className="screen ani-fadeup";
  d.style.padding="22px 16px 90px";

  // 戻るボタン
  var bb=document.createElement("button");
  bb.style.cssText="background:none;border:none;color:#a0b0c0;font-size:20px;padding:4px 8px 16px 0;display:flex;align-items:center;gap:4px";
  bb.innerHTML='‹ <span style="font-size:14px;font-weight:700">戻る</span>';
  bb.onclick=function(){set({view:null});};
  d.appendChild(bb);

  d.innerHTML+=''+'<div style="margin-bottom:24px"><p style="font-size:12px;color:#a0b0c0;font-weight:700;letter-spacing:.1em;margin-bottom:4px">'+p0.y+"年"+p0.m+"月"+p0.d+'日の記録</p><h2 style="font-size:24px;font-weight:700;color:#ffffff">チェック結果</h2></div>';
  // ← innerHTML+=でbutton消えないようにbuttonの後に追記

  // スコアリング
  var rw=document.createElement("div");rw.style.cssText="display:flex;justify-content:center;margin-bottom:26px";
  rw.appendChild(makeRing(score));d.appendChild(rw);

  // カテゴリバー
  var cc=document.createElement("div");cc.className="card";cc.style.padding="20px 18px";cc.style.marginBottom="14px";
  var cctitle=document.createElement("p");cctitle.style.cssText="font-size:13px;font-weight:700;color:#a0b0c0;letter-spacing:.1em;margin-bottom:16px";cctitle.textContent="カテゴリ別スコア";cc.appendChild(cctitle);
  QS.forEach(function(q){var s2=rec.ans[q.id]!=null?q.sc[rec.ans[q.id]]:null;if(s2!=null)cc.appendChild(makeCatBar(q,s2));});
  d.appendChild(cc);

  // レーダーチャート
  var rc=document.createElement("div");rc.className="card";rc.style.cssText="padding:20px 16px;margin-bottom:14px;text-align:center";
  var rct=document.createElement("p");rct.style.cssText="font-size:13px;font-weight:700;color:#f0f4f8;letter-spacing:.1em;margin-bottom:16px;text-align:left";rct.textContent="バランスチャート";rc.appendChild(rct);
  var rcw=document.createElement("div");rcw.style.cssText="display:flex;justify-content:center;overflow:hidden";
  rcw.appendChild(makeRadar(rec.ans,null,260));rc.appendChild(rcw);d.appendChild(rc);

  // 良いこと
  if(rec.free){
    var gd=document.createElement("div");
    gd.style.cssText="background:linear-gradient(135deg,rgba(68,232,200,.1),rgba(126,184,255,.07));border:2px solid rgba(68,232,200,.28);border-radius:16px;padding:18px;margin-bottom:14px";
    gd.innerHTML='<p style="font-size:11px;letter-spacing:.2em;color:#44e8c8;font-weight:700;margin-bottom:8px">✦ TODAY\'S GOOD THING</p>'
      +'<p style="font-size:15px;line-height:1.85;color:#f0f4f8">'+rec.free.replace(/</g,"&lt;")+'</p>';
    d.appendChild(gd);
  }

  var eb=document.createElement("button");
  eb.style.cssText="width:100%;padding:14px;background:#1e2638;border:2px solid rgba(255,255,255,.14);border-radius:14px;color:#c0ccd8;font-size:15px;font-weight:700;letter-spacing:.04em";
  eb.textContent="✎ 編集する";
  eb.onclick=function(){set({quiz:dk,view:null,qstep:0,qans:rec.ans,qfree:rec.free||"",qdir:1});};
  d.appendChild(eb);
  return d;
}

/* =============================================
   グラフ画面
============================================= */
function renderChart(){
  var year=S.gY,month=S.gM,cat=S.gCat,recs=S.rec;
  var dim=new Date(year,month+1,0).getDate();
  var CATS=[{k:"total",lb:"総合",c:"#44e8c8"}].concat(QS.map(function(q){return{k:"cat"+q.id,lb:q.cat,c:q.col};}));
  var ac=CATS.find(function(c){return c.k===cat;})||CATS[0];

  var data=[];
  for(var dd=1;dd<=dim;dd++){
    var key=year+"-"+p2(month+1)+"-"+p2(dd);
    var rec=recs[key];var entry={day:dd};
    if(rec){entry.total=calcScore(rec.ans);QS.forEach(function(q){if(rec.ans[q.id]!=null)entry["cat"+q.id]=q.sc[rec.ans[q.id]];});}
    data.push(entry);
  }
  var mRecs=Object.entries(recs).filter(function(e){var p=parseDK(e[0]);return p.y===year&&p.m===month+1;}).map(function(e){return e[1];});
  var mAvgSc=QS.reduce(function(acc,q){
    var ss=mRecs.filter(function(r){return r.ans[q.id]!=null;}).map(function(r){return q.sc[r.ans[q.id]];});
    if(ss.length)acc[q.id]=Math.round(ss.reduce(function(a,b){return a+b;},0)/ss.length);
    return acc;
  },{});
  var vals=data.filter(function(d){return d[cat]!=null;}).map(function(d){return d[cat];});
  var avg=vals.length?Math.round(vals.reduce(function(a,b){return a+b;},0)/vals.length):null;
  var max=vals.length?Math.max.apply(null,vals):null;
  var min=vals.length?Math.min.apply(null,vals):null;

  var d=document.createElement("div");
  d.className="screen ani-fadeup";
  d.style.padding="26px 16px 90px";

  d.innerHTML='<div style="margin-bottom:22px"><p style="font-size:11px;letter-spacing:.22em;color:#44e8c8;margin-bottom:8px;font-weight:700">MONTHLY REPORT</p><h2 style="font-size:26px;font-weight:700;color:#ffffff">月別グラフ</h2></div>';

  // 月ナビ
  var nav=document.createElement("div");nav.style.cssText="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px";
  var pb=document.createElement("button");pb.className="arrow-btn";pb.textContent="‹";pb.onclick=function(){set(month===0?{gM:11,gY:year-1}:{gM:month-1});};
  var nb2=document.createElement("button");nb2.className="arrow-btn";nb2.textContent="›";nb2.onclick=function(){set(month===11?{gM:0,gY:year+1}:{gM:month+1});};
  var mc3=document.createElement("div");mc3.style.textAlign="center";
  mc3.innerHTML='<div style="font-size:20px;font-weight:700;color:#f0f4f8">'+year+"年 "+MJP[month]+'</div>'
    +'<div style="font-size:12px;color:#8090a8;font-weight:700;margin-top:3px">'+vals.length+"件の記録"+(avg!=null?'<span style="color:#44e8c8;margin-left:8px">平均 '+avg+"</span>":"")+'</div>';
  nav.appendChild(pb);nav.appendChild(mc3);nav.appendChild(nb2);d.appendChild(nav);

  // カテゴリチップ
  var cw=document.createElement("div");cw.style.cssText="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px";
  CATS.forEach(function(c){
    var b=document.createElement("button");b.className="cat-chip";
    if(cat===c.k){b.style.border="2px solid "+c.c;b.style.background=c.c+"22";b.style.color=c.c;}
    b.textContent=c.lb;b.onclick=function(){set({gCat:c.k});};cw.appendChild(b);
  });
  d.appendChild(cw);

  // 折れ線グラフ
  var lc=document.createElement("div");lc.className="card";lc.style.cssText="padding:14px 10px 10px;margin-bottom:14px";
  if(vals.length===0){lc.innerHTML='<div style="text-align:center;padding:36px 16px;color:#a0b0c0;font-size:14px;font-weight:700">この月のデータはまだありません</div>';}
  else{lc.appendChild(makeLineChart(data,cat,ac.c,avg));}
  d.appendChild(lc);

  // 統計カード
  if(vals.length>0){
    var sr=document.createElement("div");sr.style.cssText="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px";
    [{lb:"平均",v:avg,c:"#44e8c8"},{lb:"最高",v:max,c:"#3ddc84"},{lb:"最低",v:min,c:"#ff7aa8"}].forEach(function(s){
      var sc=document.createElement("div");sc.className="card";sc.style.cssText="padding:14px 8px;text-align:center";
      sc.innerHTML='<div style="font-size:11px;color:#a0b0c0;font-weight:700;letter-spacing:.05em;margin-bottom:6px">'+s.lb+'</div>'
        +'<div style="font-size:26px;font-weight:700;color:'+s.c+'">'+s.v+'</div>';
      sr.appendChild(sc);
    });
    d.appendChild(sr);
  }

  // バランスチャート
  if(mRecs.length>0){
    var rc=document.createElement("div");rc.className="card";rc.style.cssText="padding:20px 16px;text-align:center";
    rc.innerHTML='<p style="font-size:13px;font-weight:700;color:#f0f4f8;margin-bottom:4px;text-align:left">月間バランスチャート</p>'
      +'<p style="font-size:12px;color:#a0b0c0;font-weight:700;margin-bottom:16px;text-align:left">'+mRecs.length+'日分の平均値</p>';
    var rcw=document.createElement("div");rcw.style.cssText="display:flex;justify-content:center;overflow:hidden";
    rcw.appendChild(makeRadar(null,mAvgSc,260));rc.appendChild(rcw);d.appendChild(rc);
  }
  return d;
}

/* =============================================
   ボトムナビ
============================================= */
function renderNav(){
  var nav=document.createElement("div");nav.className="bottom-nav";
  // quiz/view中はどちらのタブもアクティブにしない（ホームアイコンは cal 扱いでハイライト）
  var curTab=S.quiz||S.view?"cal":S.tab;
  var tabs=[
    {k:"cal",lb:"ホーム",ic:'<rect x="3" y="4" width="18" height="18" rx="2.5"/><path d="M3 9h18M8 2v4M16 2v4"/>'},
    {k:"chart",lb:"グラフ",ic:'<path d="M3 17l5-6 4 3 4-7 5 4"/><path d="M3 21h18"/>'}
  ];
  tabs.forEach(function(t){
    var b=document.createElement("button");b.className="nav-btn"+(curTab===t.k?" on":"");
    b.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">'+t.ic+'</svg>'+t.lb;
    b.onclick=(function(tk){return function(){set({tab:tk,quiz:null,view:null});};})(t.k);
    nav.appendChild(b);
  });
  return nav;
}

/* =============================================
   メインレンダラー
============================================= */
function render(){
  var app=document.getElementById("app");
  app.innerHTML="";
  if(S.quiz){app.appendChild(renderQuiz());}
  else if(S.view&&S.rec[S.view]){app.appendChild(renderResult());}
  else if(S.tab==="cal")app.appendChild(renderCal());
  else app.appendChild(renderChart());
  app.appendChild(renderNav());
}

render();
</script>
</body>
</html>
